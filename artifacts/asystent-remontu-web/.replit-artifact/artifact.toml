kind = "web"
previewPath = "/asystent-remontu-web/"
title = "Asystent Remontu — strona www"
version = "1.0.0"
id = "artifacts/asystent-remontu-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/asystent-remontu-web/" ]
localPort = 19499

[services.development]
run = "pnpm --filter @workspace/asystent-remontu-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/asystent-remontu-web", "run", "build" ]
publicDir = "artifacts/asystent-remontu-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19499"
BASE_PATH = "/asystent-remontu-web/"
