workflows:
  android-debug-apk:
    name: Asystent Remontu — Android Debug APK
    max_build_duration: 60
    environment:
      node: 20.18.0
      java: 17
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $CM_BUILD_DIR/artifacts/mobile/node_modules
    scripts:
      - name: Install pnpm + workspace dependencies
        script: |
          npm install -g pnpm@9
          cd $CM_BUILD_DIR
          pnpm install --frozen-lockfile || pnpm install
      - name: Expo prebuild (Android)
        script: |
          cd $CM_BUILD_DIR/artifacts/mobile
          npx expo prebuild --platform android --clean --non-interactive
      - name: Build Debug APK
        script: |
          cd $CM_BUILD_DIR/artifacts/mobile/android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
    artifacts:
      - artifacts/mobile/android/app/build/outputs/apk/debug/*.apk
      - artifacts/mobile/android/app/build/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - jakatora68@gmail.com
        notify:
          success: true
          failure: true

  android-release-apk:
    name: Asystent Remontu — Android Release APK (signed)
    max_build_duration: 60
    environment:
      android_signing:
        - asystent_remontu_keystore
      node: 20.18.0
      java: 17
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $CM_BUILD_DIR/artifacts/mobile/node_modules
    scripts:
      - name: Install pnpm + workspace dependencies
        script: |
          npm install -g pnpm@9
          cd $CM_BUILD_DIR
          pnpm install --frozen-lockfile || pnpm install
      - name: Expo prebuild (Android)
        script: |
          cd $CM_BUILD_DIR/artifacts/mobile
          npx expo prebuild --platform android --clean --non-interactive
      - name: Inject release signingConfig into Gradle
        script: |
          cd $CM_BUILD_DIR/artifacts/mobile/android/app
          # Codemagic auto-exports CM_KEYSTORE_PATH, CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, CM_KEY_PASSWORD
          # from the android_signing block. We rewrite signingConfigs.release + buildTypes.release.
          python3 <<'PY'
          import re, os, pathlib
          p = pathlib.Path('build.gradle')
          s = p.read_text()
          signing = f'''
              signingConfigs {{
                  release {{
                      storeFile file(System.getenv('CM_KEYSTORE_PATH'))
                      storePassword System.getenv('CM_KEYSTORE_PASSWORD')
                      keyAlias System.getenv('CM_KEY_ALIAS')
                      keyPassword System.getenv('CM_KEY_PASSWORD')
                  }}
              }}
              buildTypes {{
                  release {{
                      signingConfig signingConfigs.release
                      minifyEnabled enableProguardInReleaseBuilds
                      proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
                  }}
              }}
          '''
          # Replace existing buildTypes block (and signingConfigs if any)
          s = re.sub(r'signingConfigs\s*\{[^}]*(?:\{[^}]*\}[^}]*)*\}', '', s, flags=re.DOTALL)
          s = re.sub(r'buildTypes\s*\{[^}]*(?:\{[^}]*\}[^}]*)*\}', signing, s, count=1, flags=re.DOTALL)
          p.write_text(s)
          print('OK — signingConfigs.release injected')
          PY
      - name: Build Release APK
        script: |
          cd $CM_BUILD_DIR/artifacts/mobile/android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace
    artifacts:
      - artifacts/mobile/android/app/build/outputs/apk/release/*.apk
      - artifacts/mobile/android/app/build/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - jakatora68@gmail.com
        notify:
          success: true
          failure: true

