  ios-release-ipa:
    name: Asystent Remontu — iOS Release IPA (App Store, auto-signing via ASC API)
    max_build_duration: 90
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.replit.remontasystent
      groups:
        - certificate_credentials
      vars:
        XCODE_WORKSPACE: AsystentRemontu.xcworkspace
        XCODE_SCHEME: AsystentRemontu
        BUNDLE_ID: app.replit.remontasystent
      node: 20.18.0
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $HOME/Library/Caches/Homebrew
        - $CM_BUILD_DIR/artifacts/mobile/node_modules
        - $HOME/.cocoapods/repos
    scripts:
      - name: Install pnpm + workspace deps
        script: |
          npm install -g pnpm@10
          cd $CM_BUILD_DIR
          pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile
      - name: Expo prebuild (iOS)
        script: |
          cd $CM_BUILD_DIR/artifacts/mobile
          npx expo prebuild --platform ios --clean --non-interactive
      - name: Pod install
        script: |
          cd $CM_BUILD_DIR/artifacts/mobile/ios
          pod install --repo-update
      - name: Set up provisioning profiles
        script: |
          cd $CM_BUILD_DIR/artifacts/mobile/ios
          xcode-project use-profiles
      - name: Build .ipa
        script: |
          cd $CM_BUILD_DIR/artifacts/mobile/ios
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - artifacts/mobile/ios/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      email:
        recipients:
          - jakatora68@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testing
